# nginx vhost for exec.aiwholesail.com
#
# Routes the dashboard subdomain to the existing aiwholesail-api process,
# prepending /exec to every path so the express router can mount its
# routes at /exec/* and have them stay invisible on api.aiwholesail.com.
#
# Install:
#   sudo cp deploy/nginx/exec.aiwholesail.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/exec.aiwholesail.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d exec.aiwholesail.com  # provisions cert + updates the vhost

# HTTP → HTTPS redirect (certbot will inject the 80 → 443 redirect itself
# on first run; this block also covers the brief window before that runs).
server {
    listen 80;
    listen [::]:80;
    server_name exec.aiwholesail.com;

    # Let's Encrypt HTTP-01 challenge (certbot handles this automatically).
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name exec.aiwholesail.com;

    # certbot will inject the ssl_certificate / ssl_certificate_key lines.
    # Keep TLS parameters tight per Mozilla intermediate.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers — the dashboard is auth-gated and ships nothing
    # sensitive in HTML; HSTS + standard hardening.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # The aiwholesail-api process listens on port 3001 by default. The
    # `/exec/` prefix on proxy_pass means a request to
    #     exec.aiwholesail.com/login
    # is forwarded to the backend as
    #     /exec/login
    # which the express router catches via `app.use('/exec', execRoutes)`.
    location / {
        proxy_pass http://127.0.0.1:3001/exec/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    access_log /var/log/nginx/exec.aiwholesail.com.access.log;
    error_log  /var/log/nginx/exec.aiwholesail.com.error.log;
}
