# nginx vhost for aiwholesail.com (main marketing + SPA)
#
# Serves the Vite SPA build out of /var/www/aiwholesail/dist with
# proper security headers — including server-side CSP frame-ancestors
# and X-Frame-Options (browsers ignore frame-ancestors via <meta>, so
# this nginx delivery is the canonical clickjack protection).
#
# Install (manual — this file is NOT auto-deployed; CI only rsyncs dist/):
#   sudo cp deploy/nginx/aiwholesail.com.conf /etc/nginx/sites-available/aiwholesail
#   sudo ln -sf /etc/nginx/sites-available/aiwholesail /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d aiwholesail.com -d www.aiwholesail.com
#
# History: pre-2026-05-12 prod nginx for aiwholesail.com served NO security
# headers (verified via curl). CSP and clickjack protection lived only in
# a <meta> tag, but `frame-ancestors` is spec-required to be delivered as
# an HTTP header — meta delivery is silently ignored. This vhost closes
# that gap and pairs with the GA4 connect-src fix in
# src/lib/security-enhanced.ts.

# HTTP → HTTPS redirect (certbot will inject the 80 → 443 redirect itself
# on first run; this block also covers the brief window before that runs).
server {
    listen 80;
    listen [::]:80;
    server_name aiwholesail.com www.aiwholesail.com;

    # Let's Encrypt HTTP-01 challenge (certbot handles this automatically).
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aiwholesail.com www.aiwholesail.com;

    # certbot will inject the ssl_certificate / ssl_certificate_key lines.
    # Keep TLS parameters tight per Mozilla intermediate.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    root /var/www/aiwholesail/dist;
    index index.html;

    # ---------- Security headers ----------
    # HSTS — two-year max-age per Mozilla.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Clickjacking protection — must be HTTP headers, NOT <meta>.
    # `frame-ancestors` in <meta> is ignored by browsers per spec.
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # MIME-type sniffing protection.
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # NOTE: The full Content-Security-Policy (script-src, connect-src,
    # img-src, etc.) is still delivered via <meta> from SEOHead.tsx so it
    # can be updated through normal CI without touching nginx. The
    # `frame-ancestors` directive above is delivered separately as an
    # HTTP header because <meta> delivery of `frame-ancestors` is invalid
    # per the CSP3 spec.

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # React Router — send all non-asset requests to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for Vite-hashed assets.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add security headers (add_header is not inherited into
        # nested location blocks that declare their own add_header).
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    access_log /var/log/nginx/aiwholesail.com.access.log;
    error_log  /var/log/nginx/aiwholesail.com.error.log;
}
