server {
    listen 80;
    listen [::]:80;
    server_name aiwholesail.com www.aiwholesail.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aiwholesail.com www.aiwholesail.com;

    ssl_certificate /etc/letsencrypt/live/aiwholesail.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiwholesail.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/aiwholesail.com;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # HTML files - no cache, always check for updates
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS/CSS with hashes - cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /lovable-uploads/ {
        expires 30d;
        add_header Cache-Control "public";
    }

# Google Tag Gateway for Advertisers    # Routes /metrics/* through first-party domain    location /metrics/ {        proxy_pass https://gtm-ncs4qdfp.fps.goog/metrics/;        proxy_ssl_server_name on;        proxy_set_header Host gtm-ncs4qdfp.fps.goog;        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-Proto $scheme;        proxy_set_header X-Forwarded-CountryRegion "";        proxy_set_header X-Forwarded-Geolocation "";        proxy_buffering off;        proxy_http_version 1.1;    }
    # Same-origin API proxy — eliminates CORS preflight for in-app browsers
    # (Facebook/Instagram webviews that satisfy OPTIONS but silently drop POST).
    # Forwards to the local Express API on port 3202.
    location /api/ {
        proxy_pass http://127.0.0.1:3202;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
        # Disable buffering for streaming responses (e.g. AI agent SSE)
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ===== Google Tag Gateway for Advertisers =====
# Routes /metrics/* through first-party domain to gtm-ncs4qdfp.fps.goog
# Inserted BEFORE the catch-all location / block
