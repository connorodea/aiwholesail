name: CI / Deploy

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: CI — typecheck + build (runs on all pushes and PRs)
  # ---------------------------------------------------------------------------
  ci:
    name: CI (typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      # Static guard: every callApi('X', ...) in src/lib/zillow-api.ts
      # must reference a proxy-supported action. Catches the PR #207
      # class of regression (callApi('walkScore') → 100% upstream reject)
      # at PR time instead of in production.
      - name: Lint Zillow proxy actions
        run: node scripts/check-zillow-actions.mjs

      # Build with the correct API URL based on target branch
      - name: Build (staging)
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'pull_request' && github.base_ref == 'staging')
        run: npm run build
        env:
          VITE_API_URL: https://staging-api.aiwholesail.com

      - name: Build (production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm run build
        env:
          VITE_API_URL: https://api.aiwholesail.com

      - name: Upload dist artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2: Syntax Gate — node --check every .js file in aiwholesail-api/
  #
  # Runs on every push/PR (same triggers as ci). Catches ReferenceErrors and
  # syntax errors that TypeScript's type-checker ignores because they live in
  # plain JS files (the API is Node.js/CommonJS, not compiled TypeScript).
  #
  # This gate would have caught PR #315 (corsOrigins ReferenceError) before
  # it hit production, because `node --check` parses the file and validates
  # top-level identifier references without executing the module.
  #
  # Ordering: needs: ci ensures the artifact upload finished, and puts this
  # gate between CI and both deploy jobs so a syntax failure aborts deploy.
  # ---------------------------------------------------------------------------
  syntax-check:
    name: Syntax gate (node --check)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: node --check all API JS files
        # Excludes node_modules and test/ directories.
        # find -print0 + xargs -0 handles filenames with spaces safely.
        # -n1 means one file per node invocation so the first failure
        # surfaces the exact filename rather than a combined error blob.
        run: |
          set -euo pipefail
          echo "Checking all .js files in aiwholesail-api/ for syntax errors..."
          find aiwholesail-api \
            -name "*.js" \
            -not -path "*/node_modules/*" \
            -not -path "*/test/*" \
            -print0 \
          | xargs -0 -n1 node --check
          echo "Syntax gate passed — no errors found."

  # ---------------------------------------------------------------------------
  # Job 3: Deploy Staging — push to staging branch
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ci, syntax-check]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]    && missing+=("HETZNER_CO_HOST")
          [[ -z "${{ secrets.HETZNER_CO_USER }}" ]]    && missing+=("HETZNER_CO_USER")
          [[ -z "${{ secrets.HETZNER_CO_SSH_KEY }}" ]] && missing+=("HETZNER_CO_SSH_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_CO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          cat >> ~/.ssh/config <<EOF
          Host hetzner_co
            HostName ${{ secrets.HETZNER_CO_HOST }}
            User ${{ secrets.HETZNER_CO_USER }}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      # Deploy frontend to staging
      - name: Rsync frontend to staging
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/staging.aiwholesail.com/

      # Deploy API to staging
      - name: Rsync API to staging
        run: |
          rsync -az --delete \
            --exclude='node_modules' --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            aiwholesail-api/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/aiwholesail-api-staging/

      - name: Install API deps and restart staging
        run: |
          ssh hetzner_co << 'DEPLOY'
            set -euo pipefail
            cd /var/www/aiwholesail-api-staging
            npm install --omit=dev 2>&1 | tail -3
            # Install any missing optional deps
            npm install resend twilio axios 2>/dev/null || true
            # Apply pending schema migrations BEFORE restarting so the new
            # code never sees an old schema. The runner reads .env itself
            # via `require('dotenv').config()` — we DON'T bash-source the
            # .env file, because some values contain literal `$2` text
            # (regex pattern, JWT format, etc.) which trips bash's `-u`
            # flag with "unbound variable". Failure here exits 1 →
            # systemctl restart never runs → old process keeps serving.
            npm run migrate
            sudo systemctl restart aiwholesail-api-staging
            sleep 2
            if systemctl is-active --quiet aiwholesail-api-staging; then
              echo "Staging API is running."
            else
              echo "ERROR: Staging API failed to start."
              journalctl -u aiwholesail-api-staging --no-pager -n 10
              exit 1
            fi
            sudo systemctl reload nginx
            echo "Staging deployment complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          DEPLOY

      # Lightweight HTTP health probe for staging — no auto-rollback, but
      # fail the job visibly if the staging API never comes up within 60s.
      - name: Health probe (staging)
        run: |
          set -euo pipefail
          echo "Probing staging health endpoint..."
          MAX=30; attempt=0
          until [[ "${attempt}" -ge "${MAX}" ]]; do
            attempt=$(( attempt + 1 ))
            code=$(ssh hetzner_co \
              "curl --silent --max-time 3 --output /dev/null --write-out '%{http_code}' http://localhost:3202/health 2>/dev/null || echo 000")
            if [[ "${code}" == "200" ]]; then
              echo "Staging healthy (HTTP 200) on attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt}/${MAX}: HTTP ${code} — waiting 2s"
            sleep 2
          done
          echo "ERROR: Staging API did not return HTTP 200 within 60s."
          exit 1

  # ---------------------------------------------------------------------------
  # Job 4: Deploy Production — push to main branch
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ci, syntax-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]    && missing+=("HETZNER_CO_HOST")
          [[ -z "${{ secrets.HETZNER_CO_USER }}" ]]    && missing+=("HETZNER_CO_USER")
          [[ -z "${{ secrets.HETZNER_CO_SSH_KEY }}" ]] && missing+=("HETZNER_CO_SSH_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_CO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          cat >> ~/.ssh/config <<EOF
          Host hetzner_co
            HostName ${{ secrets.HETZNER_CO_HOST }}
            User ${{ secrets.HETZNER_CO_USER }}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      # -----------------------------------------------------------------------
      # Capture the pre-deploy SHA BEFORE rsync overwrites any files on VPS.
      # This is the SHA we roll back to if /health never comes up after
      # the new version is deployed. Must run BEFORE the rsync steps.
      # The VPS is a git repo — rsync ships updated JS files but does NOT
      # run `git pull`, so git rev-parse HEAD reflects the last-known-good
      # commit that corresponds to the current node_modules on disk.
      # -----------------------------------------------------------------------
      - name: Capture pre-deploy SHA on production
        id: capture_sha
        run: |
          PREV_SHA=$(ssh hetzner_co "cd /var/www/aiwholesail-api && git rev-parse HEAD 2>/dev/null || echo 'unknown'")
          echo "prev_sha=${PREV_SHA}" >> "$GITHUB_OUTPUT"
          echo "Pre-deploy SHA: ${PREV_SHA}"

      # Deploy frontend to production
      - name: Rsync frontend to production
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/aiwholesail.com/

      # Deploy API to production
      - name: Rsync API to production
        run: |
          rsync -az --delete \
            --exclude='node_modules' --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            aiwholesail-api/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/aiwholesail-api/

      - name: Install API deps and restart production
        run: |
          ssh hetzner_co << 'DEPLOY'
            set -euo pipefail
            cd /var/www/aiwholesail-api
            npm install --omit=dev 2>&1 | tail -3
            npm install resend twilio axios 2>/dev/null || true
            # Apply pending schema migrations BEFORE restarting so the new
            # code never sees an old schema. The runner reads .env itself
            # via `require('dotenv').config()` — we DON'T bash-source the
            # .env file, because some values contain literal `$2` text
            # (regex pattern, JWT format, etc.) which trips bash's `-u`
            # flag with "unbound variable". Failure here exits 1 →
            # systemctl restart never runs → old process keeps serving.
            npm run migrate
            sudo systemctl restart aiwholesail-api
            sleep 2
            if systemctl is-active --quiet aiwholesail-api; then
              echo "Production API is running."
            else
              echo "ERROR: Production API failed to start."
              journalctl -u aiwholesail-api --no-pager -n 10
              exit 1
            fi
            sudo systemctl reload nginx
            echo "Production deployment complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          DEPLOY

      # -----------------------------------------------------------------------
      # Post-deploy health probe + auto-rollback
      #
      # Uploads health-probe-or-rollback.sh to the VPS and runs it.
      # The script polls https://api.aiwholesail.com/health for up to 60s
      # (30 attempts × 2s). On success it exits 0 and this step passes.
      # On timeout it:
      #   1. git reset --hard to PREV_SHA
      #   2. npm ci --omit=dev
      #   3. systemctl restart aiwholesail-api
      #   4. Sends a Resend alert email
      #   5. exits 1 — failing this step and the whole job
      #
      # RESEND_API_KEY must be set as a GitHub Secret (same key the API uses
      # at runtime via its own .env — we pass it as an env var here so the
      # rollback script can call Resend's REST API directly without dotenv).
      # -----------------------------------------------------------------------
      - name: Health probe and auto-rollback on failure
        env:
          PREV_SHA: ${{ steps.capture_sha.outputs.prev_sha }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail

          # Copy the rollback script to the VPS
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              .github/scripts/health-probe-or-rollback.sh \
              "${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/tmp/health-probe-or-rollback.sh"

          # Execute it remotely, passing all required args.
          # Note: RESEND_API_KEY is passed as an env variable on the SSH
          # command line (not echoed in logs). The script receives it as $5.
          ssh hetzner_co \
            "chmod +x /tmp/health-probe-or-rollback.sh && \
             RESEND_KEY='${RESEND_API_KEY}' bash -c '\
               /tmp/health-probe-or-rollback.sh \
                 /var/www/aiwholesail-api \
                 aiwholesail-api \
                 http://localhost:3202/health \
                 \"${PREV_SHA}\" \
                 \"\$RESEND_KEY\" \
                 cpodea5@gmail.com\
             '"
