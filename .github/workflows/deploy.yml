name: CI / Deploy

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: CI — typecheck + build (runs on all pushes and PRs)
  # ---------------------------------------------------------------------------
  ci:
    name: CI (typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      # Build with the correct API URL based on target branch
      - name: Build (staging)
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'pull_request' && github.base_ref == 'staging')
        run: npm run build
        env:
          VITE_API_URL: https://staging-api.aiwholesail.com

      - name: Build (production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm run build
        env:
          VITE_API_URL: https://api.aiwholesail.com

      - name: Upload dist artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2: Deploy Staging — push to staging branch
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]    && missing+=("HETZNER_CO_HOST")
          [[ -z "${{ secrets.HETZNER_CO_USER }}" ]]    && missing+=("HETZNER_CO_USER")
          [[ -z "${{ secrets.HETZNER_CO_SSH_KEY }}" ]] && missing+=("HETZNER_CO_SSH_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_CO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          cat >> ~/.ssh/config <<EOF
          Host hetzner_co
            HostName ${{ secrets.HETZNER_CO_HOST }}
            User ${{ secrets.HETZNER_CO_USER }}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      # Deploy frontend to staging
      - name: Rsync frontend to staging
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/staging.aiwholesail.com/

      # Deploy API to staging
      - name: Rsync API to staging
        run: |
          rsync -az --delete \
            --exclude='node_modules' --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            aiwholesail-api/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/aiwholesail-api-staging/

      - name: Install API deps and restart staging
        run: |
          ssh hetzner_co << 'DEPLOY'
            set -euo pipefail
            cd /var/www/aiwholesail-api-staging
            npm install --omit=dev 2>&1 | tail -3
            # Install any missing optional deps
            npm install resend twilio axios 2>/dev/null || true
            sudo systemctl restart aiwholesail-api-staging
            sleep 2
            if systemctl is-active --quiet aiwholesail-api-staging; then
              echo "Staging API is running."
            else
              echo "ERROR: Staging API failed to start."
              journalctl -u aiwholesail-api-staging --no-pager -n 10
              exit 1
            fi
            sudo systemctl reload nginx
            echo "Staging deployment complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          DEPLOY

  # ---------------------------------------------------------------------------
  # Job: Foreclosure Scraper CI — typecheck (PRs touching foreclosure-scraper/)
  # ---------------------------------------------------------------------------
  foreclosure-scraper-ci:
    name: Foreclosure Scraper CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect foreclosure-scraper changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            git fetch --depth=2 origin "${{ github.ref_name }}" || true
            base="HEAD^"
          else
            base="origin/${{ github.base_ref }}"
            git fetch --depth=1 origin "${{ github.base_ref }}" || true
          fi
          if git diff --name-only "$base" HEAD | grep -q '^foreclosure-scraper/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: foreclosure-scraper/package-lock.json

      - name: Install foreclosure-scraper deps
        if: steps.changes.outputs.changed == 'true'
        working-directory: foreclosure-scraper
        run: npm ci

      - name: Typecheck
        if: steps.changes.outputs.changed == 'true'
        working-directory: foreclosure-scraper
        run: npx tsc --noEmit

      - name: Build (verify dist/ emits)
        if: steps.changes.outputs.changed == 'true'
        working-directory: foreclosure-scraper
        run: npm run build

  # ---------------------------------------------------------------------------
  # Job: Foreclosure Scraper — deploy to staging (push to staging branch)
  # ---------------------------------------------------------------------------
  # This job is intentionally independent of `deploy-staging`. If a push to
  # `staging` doesn't touch foreclosure-scraper/, the job no-ops on the
  # "Detect changes" step. If the foreclosure-scraper-*-staging systemd units
  # haven't been bootstrapped yet on hetznerCO (one-time manual step — see
  # foreclosure-scraper/deploy/BOOTSTRAP_STAGING.md), this job will fail
  # loudly — by design — without affecting the main staging deploy.
  deploy-foreclosure-scraper-staging:
    name: Deploy Foreclosure Scraper to Staging
    runs-on: ubuntu-latest
    needs: foreclosure-scraper-ci
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect foreclosure-scraper changes
        id: changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^foreclosure-scraper/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No foreclosure-scraper/ changes in this push — skipping deploy."
          fi

      - name: Validate required secrets
        if: steps.changes.outputs.changed == 'true'
        run: |
          missing=()
          [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]    && missing+=("HETZNER_CO_HOST")
          [[ -z "${{ secrets.HETZNER_CO_USER }}" ]]    && missing+=("HETZNER_CO_USER")
          [[ -z "${{ secrets.HETZNER_CO_SSH_KEY }}" ]] && missing+=("HETZNER_CO_SSH_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_CO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          cat >> ~/.ssh/config <<EOF
          Host hetzner_co
            HostName ${{ secrets.HETZNER_CO_HOST }}
            User ${{ secrets.HETZNER_CO_USER }}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Rsync foreclosure-scraper to staging
        if: steps.changes.outputs.changed == 'true'
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            foreclosure-scraper/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/foreclosure-scraper-staging/

      - name: Install deps, build, migrate, restart
        if: steps.changes.outputs.changed == 'true'
        run: |
          ssh hetzner_co << 'DEPLOY'
            set -euo pipefail
            cd /var/www/foreclosure-scraper-staging

            # Fail loudly if bootstrap hasn't happened yet.
            if [[ ! -f .env ]]; then
              echo "ERROR: /var/www/foreclosure-scraper-staging/.env missing."
              echo "Run the one-time bootstrap from deploy/BOOTSTRAP_STAGING.md first."
              exit 1
            fi
            if ! systemctl list-unit-files | grep -q '^foreclosure-scraper-worker-staging.service'; then
              echo "ERROR: foreclosure-scraper-worker-staging.service not installed."
              echo "Run the one-time bootstrap from deploy/BOOTSTRAP_STAGING.md first."
              exit 1
            fi

            # Full install (incl. typescript) → build → prune dev deps.
            npm ci 2>&1 | tail -3
            npm run build
            npm prune --omit=dev

            # Apply any new migrations. Idempotent — already-applied files are skipped.
            # ts-node lives in devDependencies (just pruned), so we run the compiled JS.
            node dist/scripts/migrate.js

            sudo systemctl restart foreclosure-scraper-worker-staging
            sudo systemctl restart foreclosure-scraper-scheduler-staging
            sleep 3

            for unit in foreclosure-scraper-worker-staging foreclosure-scraper-scheduler-staging; do
              if systemctl is-active --quiet "$unit"; then
                echo "$unit is running."
              else
                echo "ERROR: $unit failed to start."
                journalctl -u "$unit" --no-pager -n 30
                exit 1
              fi
            done

            # Smoke /health
            if curl -sf http://127.0.0.1:3204/health > /dev/null; then
              echo "Health check passed."
            else
              echo "ERROR: /health did not return 200."
              exit 1
            fi

            echo "Foreclosure scraper staging deploy complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          DEPLOY

  # ---------------------------------------------------------------------------
  # Job 3: Deploy Production — push to main branch
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]    && missing+=("HETZNER_CO_HOST")
          [[ -z "${{ secrets.HETZNER_CO_USER }}" ]]    && missing+=("HETZNER_CO_USER")
          [[ -z "${{ secrets.HETZNER_CO_SSH_KEY }}" ]] && missing+=("HETZNER_CO_SSH_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_CO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          cat >> ~/.ssh/config <<EOF
          Host hetzner_co
            HostName ${{ secrets.HETZNER_CO_HOST }}
            User ${{ secrets.HETZNER_CO_USER }}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      # Deploy frontend to production
      - name: Rsync frontend to production
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/aiwholesail.com/

      # Deploy API to production
      - name: Rsync API to production
        run: |
          rsync -az --delete \
            --exclude='node_modules' --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            aiwholesail-api/ \
            ${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/aiwholesail-api/

      - name: Install API deps and restart production
        run: |
          ssh hetzner_co << 'DEPLOY'
            set -euo pipefail
            cd /var/www/aiwholesail-api
            npm install --omit=dev 2>&1 | tail -3
            npm install resend twilio axios 2>/dev/null || true
            sudo systemctl restart aiwholesail-api
            sleep 2
            if systemctl is-active --quiet aiwholesail-api; then
              echo "Production API is running."
            else
              echo "ERROR: Production API failed to start."
              journalctl -u aiwholesail-api --no-pager -n 10
              exit 1
            fi
            sudo systemctl reload nginx
            echo "Production deployment complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          DEPLOY
