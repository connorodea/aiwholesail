<!--
  TRIAL LIFECYCLE BASE TEMPLATE
  Shared HTML/CSS scaffold for all trial-day-* templates.
  Copy this for each new lifecycle email; replace the title, hero, message,
  CTA, and PS sections. Match welcome-template.html's visual style.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ template_title }}</title>
  <style>
    body, table, td, p, a { margin: 0; padding: 0; border: 0; font-size: 100%; font: inherit; vertical-align: baseline; }
    body { line-height: 1; }
    table { border-collapse: collapse; border-spacing: 0; }
    img { border: 0; outline: none; text-decoration: none; display: block; }
    .ExternalClass { width: 100%; }
    .ExternalClass, .ExternalClass p, .ExternalClass span, .ExternalClass font, .ExternalClass td, .ExternalClass div { line-height: 100%; }

    /* Cyan-on-dark AIWholesail brand identity */
    @media only screen and (max-width: 600px) {
      .container { width: 100% !important; }
      .content { padding: 24px !important; }
      .cta-button { width: 100% !important; padding: 16px !important; font-size: 16px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
  <table cellpadding="0" cellspacing="0" border="0" width="100%" style="background: #0a0a0a; padding: 40px 0;">
    <tr>
      <td align="center">
        <table class="container" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width: 600px; background-color: #0f0f0f; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);">

          <!-- Logo header -->
          <tr>
            <td style="padding: 32px 40px 16px 40px; text-align: center;">
              <img src="https://aiwholesail.com/logo-aiw-email.png" alt="AIWholesail" width="180" style="margin: 0 auto;">
            </td>
          </tr>

          <!-- Hero -->
          <tr>
            <td style="padding: 16px 40px 32px 40px; text-align: center;">
              <h1 style="color: #ffffff; font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0;">{{ hero_h1 }}</h1>
              <p style="color: rgba(255,255,255,0.6); font-size: 16px; margin: 16px 0 0 0; line-height: 1.5;">{{ hero_subhead }}</p>
            </td>
          </tr>

          <!-- Message body -->
          <tr>
            <td class="content" style="padding: 16px 40px 40px 40px;">
              {{ message_body_html }}
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td style="padding: 0 40px 40px 40px; text-align: center;">
              <a href="{{ primary_cta_url }}" class="cta-button"
                style="display: inline-block; background-color: #06b6d4; color: #000000; text-decoration: none; padding: 18px 40px; border-radius: 8px; font-weight: 700; font-size: 16px;">
                {{ primary_cta_label }}
              </a>
            </td>
          </tr>

          <!-- PS / Founder signature -->
          <tr>
            <td style="padding: 0 40px 40px 40px; border-top: 1px solid rgba(255,255,255,0.06);">
              <p style="color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; margin: 24px 0 0 0;">{{ ps_text }}</p>
              <p style="color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.5; margin: 24px 0 0 0;">
                — Connor O'Dea, Founder<br>
                <a href="tel:+12488814147" style="color: #06b6d4; text-decoration: none;">248-881-4147</a> · <a href="mailto:connor@aiwholesail.com" style="color: #06b6d4; text-decoration: none;">connor@aiwholesail.com</a>
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #0a0a0a; padding: 24px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
              <p style="color: rgba(255,255,255,0.4); font-size: 12px; margin: 0; line-height: 1.5;">
                AIWholesail · AI-powered real estate investing<br>
                <a href="{{ unsubscribe_url }}" style="color: rgba(255,255,255,0.5); text-decoration: underline;">Unsubscribe</a>
                · <a href="https://aiwholesail.com" style="color: rgba(255,255,255,0.5); text-decoration: underline;">aiwholesail.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
